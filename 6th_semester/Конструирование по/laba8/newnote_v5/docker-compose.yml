version: "3.9"

services:
  api-gateway:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./api_gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - notes-service

  auth-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=auth
      - POSTGRES_PASSWORD=auth
      - POSTGRES_DB=auth
    volumes:
      - auth_data:/var/lib/postgresql/data

  auth-service:
    build:
      context: .
      dockerfile: auth_service/Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      - auth-db
      - notification-service
    environment:
      - DATABASE_URL=postgresql://auth:auth@auth-db:5432/auth
      - SECRET_KEY=change-me-in-production
      - NOTIFICATION_SERVICE_URL=http://notification-service:8003

  notes-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=notes
      - POSTGRES_PASSWORD=notes
      - POSTGRES_DB=notes
    volumes:
      - notes_data:/var/lib/postgresql/data

  notes-service:
    build:
      context: .
      dockerfile: notes_service/Dockerfile
    ports:
      - "8002:8002"
    depends_on:
      - notes-db
    environment:
      - DATABASE_URL=postgresql://notes:notes@notes-db:5432/notes
      - SECRET_KEY=change-me-in-production

  notification-service:
    build:
      context: .
      dockerfile: notification_service/Dockerfile
    ports:
      - "8003:8003"

volumes:
  auth_data:
  notes_data:
